<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no" />
<meta name="theme-color" content="#0a0a0a" />
<title>圖庫蒙太奇魔術</title>
<style>
:root{
  --bg:#070707; --panel:rgba(24,24,24,.78); --text:#fff; --sub:#b5b5b8;
  --accent:#0a84ff; --gap:2px; --cols:4; --cell:calc((100vw - (var(--cols) - 1)*var(--gap))/var(--cols));
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;height:100%;background:#000;color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","PingFang TC",sans-serif;overflow:hidden}
button,input,select{font:inherit}
button{color:inherit}
#app{height:100dvh;background:var(--bg);position:relative;overflow:hidden}
.statusbar{height:calc(50px + env(safe-area-inset-top));padding:calc(10px + env(safe-area-inset-top)) 24px 0;display:flex;justify-content:space-between;align-items:flex-start;font-weight:700;font-size:18px;position:absolute;inset:0 0 auto;z-index:20;pointer-events:none;text-shadow:0 1px 4px #000}
.status-icons{font-size:14px;letter-spacing:3px}
.header{position:absolute;z-index:15;top:calc(48px + env(safe-area-inset-top));left:0;right:0;height:118px;padding:13px 22px 10px;background:linear-gradient(#070707 0%,rgba(7,7,7,.92) 70%,transparent);display:flex;justify-content:space-between;align-items:flex-start}
.title h1{font-size:42px;line-height:1;margin:0 0 9px;letter-spacing:-2px}.title p{font-size:20px;margin:0;font-weight:650}
.header-actions{display:flex;gap:10px}.round-btn,.pill-btn{border:1px solid rgba(255,255,255,.25);background:rgba(82,82,82,.48);backdrop-filter:blur(18px);height:58px;min-width:58px;border-radius:50%;display:grid;place-items:center;font-size:27px}.pill-btn{border-radius:30px;padding:0 20px;font-size:20px;font-weight:700}
.gallery-wrap{position:absolute;inset:0;overflow:auto;overscroll-behavior:none;padding-top:calc(154px + env(safe-area-inset-top));padding-bottom:calc(106px + env(safe-area-inset-bottom));background:#080808;touch-action:pan-y}
.gallery{display:grid;grid-template-columns:repeat(var(--cols),1fr);gap:var(--gap);align-items:start;transform-origin:center top;transition:gap .22s ease,opacity .25s ease}
.tile{position:relative;width:100%;aspect-ratio:1;overflow:hidden;background:#1c1c1e;border:0;padding:0}.tile img{width:100%;height:100%;object-fit:cover;display:block;transform:scale(1.02)}
.tile .dur{position:absolute;right:7px;bottom:5px;font-size:13px;font-weight:650;text-shadow:0 1px 4px #000}.tile.is-video:after{content:"";position:absolute;inset:0;background:linear-gradient(transparent 70%,rgba(0,0,0,.45))}
.empty{grid-column:1/-1;text-align:center;padding:100px 32px;color:var(--sub);line-height:1.7}.empty b{display:block;color:white;font-size:22px;margin-bottom:8px}
.bottom{position:absolute;z-index:20;left:0;right:0;bottom:0;height:calc(94px + env(safe-area-inset-bottom));padding:8px 12px calc(8px + env(safe-area-inset-bottom));display:flex;justify-content:center;align-items:flex-start;background:linear-gradient(transparent,rgba(10,10,10,.88) 22%,#0a0a0a);gap:18px}
.tabs{height:70px;background:rgba(242,242,247,.92);color:#111;border-radius:35px;padding:5px;display:flex;gap:2px;box-shadow:0 8px 30px rgba(0,0,0,.4)}.tab{border:0;background:transparent;border-radius:30px;width:104px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:12px;font-weight:650}.tab .ico{font-size:25px;line-height:1}.tab.active{background:white;color:#007aff}.search-tab{height:70px;width:70px;border-radius:50%;border:0;background:rgba(242,242,247,.96);color:#111;font-size:31px;box-shadow:0 8px 30px rgba(0,0,0,.4)}
.viewer{position:absolute;inset:0;z-index:60;background:#000;display:none;flex-direction:column}.viewer.show{display:flex}.viewer-top{height:calc(60px + env(safe-area-inset-top));padding:calc(10px + env(safe-area-inset-top)) 18px 0;display:flex;justify-content:space-between;align-items:flex-start;position:absolute;z-index:2;left:0;right:0;background:linear-gradient(rgba(0,0,0,.8),transparent)}.viewer button{border:0;background:rgba(60,60,60,.55);border-radius:50%;width:42px;height:42px;font-size:24px}.viewer-stage{height:100%;display:grid;place-items:center;overflow:hidden;touch-action:none}.viewer-stage img{max-width:100%;max-height:100%;object-fit:contain;transition:transform .12s}.viewer-meta{position:absolute;bottom:calc(20px + env(safe-area-inset-bottom));left:0;right:0;text-align:center;text-shadow:0 1px 4px #000}
.sheet{position:absolute;z-index:80;inset:0;background:rgba(0,0,0,.45);display:none;align-items:flex-end}.sheet.show{display:flex}.sheet-card{width:100%;max-height:88dvh;overflow:auto;background:#1c1c1e;border-radius:24px 24px 0 0;padding:10px 18px calc(28px + env(safe-area-inset-bottom));box-shadow:0 -10px 50px rgba(0,0,0,.45)}.handle{width:42px;height:5px;background:#777;border-radius:3px;margin:0 auto 16px}.sheet h2{margin:0 0 14px;font-size:26px}.sheet h3{font-size:15px;color:#aaa;margin:22px 0 8px}.field{width:100%;border:0;border-radius:12px;padding:13px 14px;background:#2c2c2e;color:white;margin:5px 0}.primary,.secondary,.danger{width:100%;border:0;border-radius:13px;padding:14px;margin-top:9px;font-weight:700;background:#0a84ff}.secondary{background:#343437}.danger{background:#5a2024;color:#ffb2b7}.row{display:flex;gap:9px}.row>*{flex:1}.target-list{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.target{border:2px solid transparent;background:#2c2c2e;border-radius:14px;overflow:hidden;padding:0;color:white}.target img{display:block;width:100%;aspect-ratio:1;object-fit:cover}.target span{display:block;padding:8px 4px;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.target.active{border-color:#0a84ff}
.mode-badge{position:fixed;z-index:40;top:calc(142px + env(safe-area-inset-top));left:50%;transform:translateX(-50%) translateY(-12px);background:rgba(0,0,0,.68);backdrop-filter:blur(14px);padding:8px 14px;border-radius:20px;font-size:13px;opacity:0;pointer-events:none;transition:.2s}.mode-badge.show{opacity:1;transform:translateX(-50%) translateY(0)}
.hidden{display:none!important}.hint{color:#aaa;font-size:13px;line-height:1.55}.switchline{display:flex;justify-content:space-between;align-items:center;padding:10px 0}.switch{appearance:none;width:48px;height:28px;border-radius:14px;background:#555;position:relative;transition:.2s}.switch:checked{background:#30d158}.switch:before{content:"";position:absolute;width:24px;height:24px;border-radius:50%;background:#fff;left:2px;top:2px;transition:.2s}.switch:checked:before{transform:translateX(20px)}
</style>
</head>
<body>
<div id="app">
  <div class="statusbar"><span id="clock">12:56</span><span class="status-icons">▮▮▮ ᯤ 🔋</span></div>
  <header class="header">
    <div class="title"><h1>圖庫</h1><p><span id="count">0</span> 個項目</p></div>
    <div class="header-actions"><button class="round-btn" id="menuBtn">☰</button><button class="pill-btn" id="selectBtn">選取</button></div>
  </header>
  <main class="gallery-wrap" id="galleryWrap"><div class="gallery" id="gallery"></div></main>
  <div class="mode-badge" id="modeBadge">縮小以顯示蒙太奇</div>
  <nav class="bottom">
    <div class="tabs"><button class="tab active"><span class="ico">▣</span>圖庫</button><button class="tab"><span class="ico">▰</span>選集</button></div>
    <button class="search-tab" id="searchBtn" aria-label="搜尋">⌕</button>
  </nav>

  <section class="viewer" id="viewer">
    <div class="viewer-top"><button id="viewerClose">‹</button><button id="viewerMore">•••</button></div>
    <div class="viewer-stage" id="viewerStage"><img id="viewerImg" alt="照片"></div>
    <div class="viewer-meta" id="viewerMeta"></div>
  </section>

  <div class="sheet" id="searchSheet"><div class="sheet-card">
    <div class="handle"></div><h2>搜尋</h2>
    <input class="field" id="searchInput" placeholder="搜尋照片、人物、地點⋯" autocomplete="off">
    <h3>可能的圖庫</h3><div class="target-list" id="publicTargets"></div>
    <p class="hint">點選一位人物作為最終蒙太奇。演出時可只讓觀眾看到這個頁面。</p>
    <button class="secondary" id="closeSearch">完成</button>
  </div></div>

  <div class="sheet" id="adminSheet"><div class="sheet-card">
    <div class="handle"></div><h2>秘密設定</h2>
    <h3>1. 匯入圖庫照片</h3>
    <input class="field" id="galleryFiles" type="file" accept="image/*" multiple>
    <div class="switchline"><span>壓縮圖庫照片以節省空間</span><input class="switch" id="compressToggle" type="checkbox" checked></div>
    <div class="row"><button class="primary" id="importGallery">加入圖庫</button><button class="secondary" id="shuffleGallery">打亂順序</button></div>
    <p class="hint" id="storageInfo">影像會存進此瀏覽器的 IndexedDB；清單與設定存於 localStorage。這比直接把大量 Base64 放進 localStorage 穩定。</p>

    <h3>2. 建立名人目標</h3>
    <input class="field" id="targetName" placeholder="名人名稱">
    <input class="field" id="targetFile" type="file" accept="image/*">
    <button class="primary" id="addTarget">新增名人照片</button>
    <div class="target-list" id="adminTargets" style="margin-top:12px"></div>

    <h3>3. 魔術控制</h3>
    <label class="switchline"><span>縮到最小時自動排列蒙太奇</span><input class="switch" id="autoMosaic" type="checkbox" checked></label>
    <label class="switchline"><span>蒙太奇中允許重複使用照片</span><input class="switch" id="allowRepeat" type="checkbox"></label>
    <p class="hint">長按右下角搜尋鍵 1.2 秒可再次進入秘密設定。一般輕點只會開啟觀眾可見的名人選擇。</p>
    <button class="secondary" id="closeAdmin">完成</button><button class="danger" id="clearAll">清除所有資料</button>
  </div></div>
</div>
<script>
'use strict';
const $=s=>document.querySelector(s);
const gallery=$('#gallery'), wrap=$('#galleryWrap');
const DB_NAME='photo-mosaic-magic', STORE='images';
let db, photos=[], targets=[], selectedTargetId=null, currentOrder=[], cols=4, pinching=false, pinchStart=0, pinchCols=4, viewerIndex=0;
let settings=JSON.parse(localStorage.getItem('pmm-settings')||'{"autoMosaic":true,"allowRepeat":false}');

function openDB(){return new Promise((resolve,reject)=>{const r=indexedDB.open(DB_NAME,1);r.onupgradeneeded=()=>{const d=r.result;if(!d.objectStoreNames.contains(STORE))d.createObjectStore(STORE,{keyPath:'id'})};r.onsuccess=()=>{db=r.result;resolve(db)};r.onerror=()=>reject(r.error)})}
function tx(mode='readonly'){return db.transaction(STORE,mode).objectStore(STORE)}
function put(rec){return new Promise((res,rej)=>{const r=tx('readwrite').put(rec);r.onsuccess=()=>res();r.onerror=()=>rej(r.error)})}
function getAll(){return new Promise((res,rej)=>{const r=tx().getAll();r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error)})}
function del(id){return new Promise((res,rej)=>{const r=tx('readwrite').delete(id);r.onsuccess=()=>res();r.onerror=()=>rej(r.error)})}
function saveMeta(){localStorage.setItem('pmm-targets',JSON.stringify(targets.map(({id,name,imageId})=>({id,name,imageId}))));localStorage.setItem('pmm-selected',selectedTargetId||'');localStorage.setItem('pmm-settings',JSON.stringify(settings))}
function uid(){return crypto.randomUUID?crypto.randomUUID():Date.now()+'-'+Math.random()}
function fileToDataURL(file){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result);r.onerror=rej;r.readAsDataURL(file)})}
function loadImage(src){return new Promise((res,rej)=>{const im=new Image();im.onload=()=>res(im);im.onerror=rej;im.src=src})}
async function compressFile(file,max=560,quality=.72){const src=await fileToDataURL(file),im=await loadImage(src);let w=im.naturalWidth,h=im.naturalHeight;const scale=Math.min(1,max/Math.max(w,h));w=Math.max(1,Math.round(w*scale));h=Math.max(1,Math.round(h*scale));const c=document.createElement('canvas');c.width=w;c.height=h;c.getContext('2d').drawImage(im,0,0,w,h);return c.toDataURL('image/jpeg',quality)}
async function averageColor(src){const im=await loadImage(src),c=document.createElement('canvas');c.width=16;c.height=16;const x=c.getContext('2d',{willReadFrequently:true});x.drawImage(im,0,0,16,16);const d=x.getImageData(0,0,16,16).data;let r=0,g=0,b=0,n=0;for(let i=0;i<d.length;i+=4){if(d[i+3]<20)continue;r+=d[i];g+=d[i+1];b+=d[i+2];n++}return [r/n,g/n,b/n]}
function colorDist(a,b){return (a[0]-b[0])**2+(a[1]-b[1])**2+(a[2]-b[2])**2}
function setCols(n,announce=true){cols=Math.max(3,Math.min(18,Math.round(n)));document.documentElement.style.setProperty('--cols',cols);if(announce){const b=$('#modeBadge');b.textContent=cols>=12?'蒙太奇模式':`${cols} 欄`;b.classList.add('show');clearTimeout(setCols.t);setCols.t=setTimeout(()=>b.classList.remove('show'),700)}if(settings.autoMosaic&&cols>=12&&selectedTargetId)buildMosaicOrder();else if(cols<12&&currentOrder.length!==photos.length){currentOrder=photos.map(p=>p.id);renderGallery()}}
function photoById(id){return photos.find(p=>p.id===id)}
function targetById(id){return targets.find(t=>t.id===id)}
function renderGallery(){gallery.innerHTML='';$('#count').textContent=photos.length;if(!photos.length){gallery.innerHTML='<div class="empty"><b>尚未匯入照片</b>長按右下角搜尋鍵進入秘密設定，加入圖庫照片與名人目標。</div>';return}const order=currentOrder.length?currentOrder:photos.map(p=>p.id);const f=document.createDocumentFragment();order.forEach((id,i)=>{const p=photoById(id);if(!p)return;const b=document.createElement('button');b.className='tile';b.dataset.id=id;b.innerHTML=`<img loading="lazy" draggable="false" src="${p.src}" alt="照片 ${i+1}">`;b.onclick=()=>openViewer(i);f.appendChild(b)});gallery.appendChild(f)}
function renderTargets(){for(const sel of ['#publicTargets','#adminTargets']){const root=$(sel);root.innerHTML='';targets.forEach(t=>{const b=document.createElement('button');b.className='target'+(t.id===selectedTargetId?' active':'');const img=photoById(t.imageId);b.innerHTML=`<img src="${img?.src||''}"><span>${t.name}</span>`;b.onclick=()=>{selectedTargetId=t.id;saveMeta();renderTargets();if(sel==='#publicTargets'){$('#searchSheet').classList.remove('show');setCols(12)}else buildMosaicOrder()};root.appendChild(b)})}}
async function buildMosaicOrder(){const target=targetById(selectedTargetId),targetImage=photoById(target?.imageId);if(!targetImage||!photos.length)return;const tilePhotos=photos.filter(p=>p.id!==target.imageId);if(!tilePhotos.length)return;const width=cols,height=Math.max(1,Math.ceil(tilePhotos.length/width));const im=await loadImage(targetImage.src),c=document.createElement('canvas');c.width=width;c.height=height;const x=c.getContext('2d',{willReadFrequently:true});x.drawImage(im,0,0,width,height);const d=x.getImageData(0,0,width,height).data;const cells=[];for(let i=0;i<width*height;i++)cells.push([d[i*4],d[i*4+1],d[i*4+2]]);const pool=tilePhotos.map(p=>({...p}));const out=[];for(let i=0;i<cells.length;i++){if(!pool.length){if(settings.allowRepeat)pool.push(...tilePhotos.map(p=>({...p})));else break}let best=0,bd=Infinity;for(let j=0;j<pool.length;j++){const dist=colorDist(cells[i],pool[j].avg||[127,127,127]);if(dist<bd){bd=dist;best=j}}out.push(pool[best].id);if(!settings.allowRepeat)pool.splice(best,1)}currentOrder=out;renderGallery()}
function openViewer(i){viewerIndex=i;const order=currentOrder.length?currentOrder:photos.map(p=>p.id),p=photoById(order[i]);if(!p)return;$('#viewerImg').src=p.src;$('#viewerMeta').textContent=`${i+1} / ${order.length}`;$('#viewer').classList.add('show')}
function shiftViewer(dir){const order=currentOrder.length?currentOrder:photos.map(p=>p.id);viewerIndex=(viewerIndex+dir+order.length)%order.length;openViewer(viewerIndex)}
async function importGallery(){const files=[...$('#galleryFiles').files];if(!files.length)return alert('請先選擇照片');$('#importGallery').textContent='處理中…';for(const file of files){try{const src=$('#compressToggle').checked?await compressFile(file):await fileToDataURL(file);const rec={id:uid(),kind:'gallery',name:file.name,src,avg:await averageColor(src),created:Date.now()};await put(rec);photos.push(rec)}catch(e){console.error(e)}}currentOrder=photos.filter(p=>p.kind==='gallery').map(p=>p.id);$('#importGallery').textContent='加入圖庫';$('#galleryFiles').value='';renderGallery();updateStorageInfo()}
async function addTarget(){const name=$('#targetName').value.trim(),file=$('#targetFile').files[0];if(!name||!file)return alert('請輸入名稱並選擇照片');const src=await compressFile(file,800,.82),imageId=uid(),id=uid(),rec={id:imageId,kind:'target',name,src,avg:await averageColor(src),created:Date.now()};await put(rec);photos.push(rec);targets.push({id,name,imageId});selectedTargetId=id;saveMeta();$('#targetName').value='';$('#targetFile').value='';renderTargets();renderGallery();updateStorageInfo()}
async function updateStorageInfo(){if(navigator.storage?.estimate){const e=await navigator.storage.estimate();$('#storageInfo').textContent=`已使用約 ${(e.usage/1024/1024).toFixed(1)} MB；瀏覽器可用約 ${(e.quota/1024/1024).toFixed(0)} MB。影像存於 IndexedDB，設定存於 localStorage。`}}
function shuffle(){const ids=photos.filter(p=>p.kind==='gallery').map(p=>p.id);for(let i=ids.length-1;i;i--){const j=Math.floor(Math.random()*(i+1));[ids[i],ids[j]]=[ids[j],ids[i]]}currentOrder=ids;renderGallery()}

$('#menuBtn').onclick=()=>$('#adminSheet').classList.add('show');
$('#closeAdmin').onclick=()=>$('#adminSheet').classList.remove('show');
$('#closeSearch').onclick=()=>$('#searchSheet').classList.remove('show');
$('#importGallery').onclick=importGallery;$('#addTarget').onclick=addTarget;$('#shuffleGallery').onclick=shuffle;
$('#autoMosaic').checked=settings.autoMosaic;$('#allowRepeat').checked=settings.allowRepeat;
$('#autoMosaic').onchange=e=>{settings.autoMosaic=e.target.checked;saveMeta()};$('#allowRepeat').onchange=e=>{settings.allowRepeat=e.target.checked;saveMeta();if(cols>=12)buildMosaicOrder()};
$('#viewerClose').onclick=()=>$('#viewer').classList.remove('show');
let vx=0;$('#viewerStage').ontouchstart=e=>vx=e.touches[0].clientX;$('#viewerStage').ontouchend=e=>{const dx=e.changedTouches[0].clientX-vx;if(Math.abs(dx)>50)shiftViewer(dx<0?1:-1)};
$('#clearAll').onclick=async()=>{if(!confirm('確定清除所有圖庫與名人資料？'))return;await new Promise((res,rej)=>{const r=indexedDB.deleteDatabase(DB_NAME);r.onsuccess=res;r.onerror=rej});localStorage.removeItem('pmm-targets');localStorage.removeItem('pmm-selected');location.reload()};

let pressTimer,held=false;$('#searchBtn').addEventListener('pointerdown',()=>{held=false;pressTimer=setTimeout(()=>{held=true;$('#adminSheet').classList.add('show')},1200)});$('#searchBtn').addEventListener('pointerup',()=>{clearTimeout(pressTimer);if(!held)$('#searchSheet').classList.add('show')});$('#searchBtn').addEventListener('pointercancel',()=>clearTimeout(pressTimer));
wrap.addEventListener('touchstart',e=>{if(e.touches.length===2){pinching=true;pinchStart=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);pinchCols=cols}}, {passive:false});
wrap.addEventListener('touchmove',e=>{if(pinching&&e.touches.length===2){e.preventDefault();const dist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);const ratio=pinchStart/dist;setCols(pinchCols*ratio,false)}},{passive:false});
wrap.addEventListener('touchend',()=>{if(pinching){pinching=false;setCols(cols,true)}});
wrap.addEventListener('wheel',e=>{if(e.ctrlKey||e.metaKey){e.preventDefault();setCols(cols+(e.deltaY>0?1:-1))}},{passive:false});

function tick(){const d=new Date();$('#clock').textContent=d.toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit',hour12:false})}tick();setInterval(tick,30000);
(async function init(){await openDB();photos=await getAll();targets=JSON.parse(localStorage.getItem('pmm-targets')||'[]');selectedTargetId=localStorage.getItem('pmm-selected')||targets[0]?.id||null;currentOrder=photos.filter(p=>p.kind==='gallery').sort((a,b)=>b.created-a.created).map(p=>p.id);renderGallery();renderTargets();updateStorageInfo()})();
</script>
</body>
</html>
